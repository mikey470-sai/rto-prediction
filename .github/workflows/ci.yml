name: RTO Prediction CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Train model ───────────────────────────────────────────────────────────
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python models/train.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: models/artifacts/
          retention-days: 7

  # ── 2. Run tests ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: models/artifacts/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 3. Docker build ──────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: models/artifacts/

      - name: Build Docker image
        run: docker build -t rto-prediction:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 --name rto-api rto-prediction:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health
          docker stop rto-api
